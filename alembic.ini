# Alembic configuration for CCTV Memory (SQLite MVP).
# The database URL is resolved at runtime from CCTV_MEMORY_SQLITE_PATH
# (see migrations/env.py); sqlalchemy.url here is a placeholder default.
[alembic]
script_location = cctv_memory/infrastructure/db/migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url = sqlite:///data/cctv_memory.sqlite3

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
